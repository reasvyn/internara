# Laravel Sail development environment
# Usage: docker compose -f docker-compose.dev.yml up -d
# Or:   ./vendor/bin/sail up (if symlinked)

services:
  laravel.test:
    build:
      context: ./docker/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP:-1000}'
    image: sail-8.4/app
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${APP_PORT:-80}:80'
      - '${VITE_PORT:-5173}:5173'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
      # SQLite by default — no database service needed
      DB_CONNECTION: sqlite
      # Use database queue for dev (replace with redis for full experience)
      QUEUE_CONNECTION: database
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      - queue

  queue:
    image: sail-8.4/app
    build:
      context: ./docker/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP:-1000}'
    command: php artisan queue:work --sleep=3 --tries=3
    environment:
      DB_CONNECTION: sqlite
      QUEUE_CONNECTION: database
    volumes:
      - '.:/var/www/html'
    networks:
      - sail

networks:
  sail:
    driver: bridge
