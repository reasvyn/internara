services:
  app:
    build: .
    ports:
      - "${APP_PORT:-9000}:9000"
    environment:
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: internara
      DB_USERNAME: internara
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - storage_data:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  queue:
    build: .
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: internara
      DB_USERNAME: internara
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - storage_data:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  reverb:
    build: .
    command: php artisan reverb:start
    environment:
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
    ports:
      - "${REVERB_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build: .
    command: php artisan schedule:work
    environment:
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_DATABASE: internara
      DB_USERNAME: internara
      DB_PASSWORD: "${DB_PASSWORD}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: internara
      MYSQL_USER: internara
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_RANDOM_ROOT_PASSWORD: yes
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5

  web:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - storage_data:/app/storage
    depends_on:
      - app

volumes:
  mysql_data:
  redis_data:
  storage_data:
